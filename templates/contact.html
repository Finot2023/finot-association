<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Contact Us</title>
</head>
<body>
  {% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: auto; padding: 10px;">
    <h2 style="text-align: center; color: #0073aa;">📍 መልዕክት ይላኩሉን</h2>
    <p style="text-align: center; color: gray;">ማንኛውንም ጥያቄ፣ አስተያየት ወይም የእርዳታ ጥሪ ከታች ባለው ፎርም ቢልኩልን በፍጥነት እንመልሳለን።</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="background-color: #d4edda; color: #155724; padding: 15px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #c3e6cb; text-align: center; font-weight: bold;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/send-message" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">ቀን</label>
            <input type="date" name="date" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">ሙሉ ስም</label>
            <input type="text" name="name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">ስልክ ቁጥር</label>
            <input type="tel" name="phone" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">መልዕክት</label>
            <textarea name="message" rows="5" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">ማረጋገጫ ፋይሎች (ምስል፣ ቪዲዮ፣ ድምፅ - ከአንድ በላይ መምረጥ ይቻላል)፦</label>
            <input type="file" name="files" accept="image/*,video/*,audio/*" multiple style="width: 100%; padding: 8px; border: 1px dashed #0073aa; border-radius: 4px; background: #f9f9f9; box-sizing: border-box;">
        </div>

        <button type="submit" class="btn" style="border: none; cursor: pointer; width: 100%; padding: 12px; font-size: 1rem; background-color: #0073aa; color: white; font-weight: bold; border-radius: 4px;">መልዕክቱን እና ፋይሎችን ላክ 🚀</button>
    </form>
</div>
{% endblock %}
</body>
</html>
