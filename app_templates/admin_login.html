<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Hello, World!</title>
</head>
<body>
{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: auto; padding: 30px 20px; background: white; border: 1px solid #ddd; border-radius: 8px; margin-top: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; color: #0073aa; margin-top: 0;">🔒 የአድሚን መግቢያ</h2>
    <p style="text-align: center; color: gray; font-size: 0.9rem;">እባክዎ የተፈቀደለትን የአድሚን ስም እና ፓስወርድ ያስገቡ።</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; font-size: 0.9rem;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="/admin/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">የአድሚን ስም (Username)</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">የይለፍ ቃል (Password)</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <button type="submit" class="btn" style="border: none; cursor: pointer; width: 100%; padding: 12px; font-size: 1rem; background-color: #0073aa;">ግባ 🚪</button>
    </form>
</div>
{% endblock %}
</body>
</html>
